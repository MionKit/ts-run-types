# git-cliff — changelog generator driven by Conventional Commits.
# Configuration reference: https://git-cliff.org/docs/configuration
#
# Local use (optional, needs the git-cliff binary on PATH):
#   pnpm run changelog             # regenerate the whole CHANGELOG.md
#   pnpm run changelog:unreleased  # prepend just the unreleased section
#
# The GitHub Release notes are generated in CI by orhun/git-cliff-action
# (.github/workflows/publish.yml), so cutting a release needs no local binary.

[changelog]
# Rendered once at the top of the file.
header = """
# Changelog

All notable changes to this project are documented in this file.
The format follows [Conventional Commits](https://www.conventionalcommits.org)
and entries are generated by [git-cliff](https://git-cliff.org).

"""
# Rendered once per release (or once for the unreleased set).
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
            {% if commit.breaking %}[**breaking**] {% endif %}\
            {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}
"""
# Rendered once at the very bottom of the file.
footer = """

<!-- Generated by git-cliff -->
"""
# Strip leading / trailing whitespace from the rendered output.
trim = true

[git]
# Parse commits as Conventional Commits; drop any that do not conform.
conventional_commits = true
filter_unconventional = true
split_commits = false
# Map each conventional type to a section. The leading "<!-- NN -->" fixes the
# section order (lexicographic, zero-padded); `striptags` removes it on render.
commit_parsers = [
  { message = "^feat", group = "<!-- 00 -->Features" },
  { message = "^fix", group = "<!-- 01 -->Bug Fixes" },
  { message = "^perf", group = "<!-- 02 -->Performance" },
  { message = "^refactor", group = "<!-- 03 -->Refactoring" },
  { message = "^docs?", group = "<!-- 04 -->Documentation" },
  { message = "^test", group = "<!-- 05 -->Testing" },
  { message = "^build", group = "<!-- 06 -->Build System" },
  { message = "^ci", group = "<!-- 07 -->CI" },
  { message = "^style", group = "<!-- 08 -->Styling" },
  { message = "^chore\\(release\\):", skip = true },
  { message = "^chore\\(deps?\\)", skip = true },
  { message = "^chore", group = "<!-- 09 -->Miscellaneous" },
  { message = "^revert", group = "<!-- 10 -->Reverts" },
]
protect_breaking_commits = false
filter_commits = false
# Match the tags the release workflow pushes: v0.1.0, v1.2.3, ...
tag_pattern = "v[0-9].*"
topo_order = false
sort_commits = "newest"
