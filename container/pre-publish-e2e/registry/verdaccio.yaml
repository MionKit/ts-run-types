# Throwaway local registry for the pre-publish e2e, baked into the shared image
# and started by e2e-serve.sh. The serve script publishes the packed tarballs
# here; the in-container matrix + the host-native smoke then install the
# PUBLISHED @ts-runtypes/* from it — faithfully exercising the launcher ->
# @ts-runtypes/binary-<os>-<arch> optional-dependency resolution a bare
# file-tarball install can't.
#
# Anonymous publish + read are allowed on purpose (ephemeral, loopback only).
# Everything not published locally (unplugin, the host-smoke's vite/vitest, …)
# proxies to npmjs.
storage: /tmp/verdaccio-storage
uplinks:
  npmjs:
    url: https://registry.npmjs.org/
    cache: false
packages:
  '@*/*':
    access: $all
    publish: $all
    unpublish: $all
    proxy: npmjs
  '**':
    access: $all
    publish: $all
    unpublish: $all
    proxy: npmjs
# The platform-binary tarballs are ~8 MB, and `npm publish` base64-wraps the
# tarball into the JSON PUT body (~1.33x), exceeding verdaccio's ~10 MB default
# and 413-ing. Raise the ceiling generously.
max_body_size: 200mb
publish:
  allow_offline: true
log:
  type: stdout
  format: pretty
  level: warn
