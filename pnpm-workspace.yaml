packages:
  - 'packages/*'

# ── Build-script allowlist ───────────────────────────────
# pnpm 11 blocks every dependency install/postinstall script by default.
# Only the packages listed here may run them.
allowBuilds:
  esbuild: true

# ── Lockfile / install integrity ─────────────────────────
# Strict mode: `pnpm install` never re-resolves or rewrites the lockfile.
# If the lockfile drifts from package.json, install fails with
# ERR_PNPM_OUTDATED_LOCKFILE. Devs must opt in explicitly via
# `pnpm install --no-frozen-lockfile`, `pnpm update`, or `pnpm add`
# to mutate the lockfile.
frozenLockfile: true
verifyStoreIntegrity: true

# ── Version pinning (no auto-bumps) ──────────────────────
# Empty savePrefix means exact pinning (replaces legacy save-exact=true).
savePrefix: ''
saveWorkspaceProtocol: rolling
resolutionMode: highest

# ── Supply-chain protection: minimum release age ─────────
# Refuse to install package versions younger than 30 days (43200 minutes).
# Defeats fast-spreading malicious releases (TanStack-style).
minimumReleaseAge: 43200
# Only enforced when the lockfile is being (re)resolved — i.e. on
# `pnpm add`, `pnpm update`, or `pnpm install --no-frozen-lockfile`.
# Locked entries already in pnpm-lock.yaml are NOT re-checked
# (tracked upstream by pnpm PR #11583, currently unmerged).
# Keep empty by default; add per-package entries only if a future bump is
# blocked by a transitive we trust.
#
# `@mionjs/core` — our own @mionjs/* sibling package on npm. The marker
# package pulls `getRTUtils` from it at runtime. Trusted implicitly
# (same org as this repo); the release-age policy exists to defend
# against compromised third-party publishers, which doesn't apply here.
#
# `@rollup/rollup-*` — platform-specific native binaries for the rollup
# version vite pulls in. These ship lockstep as a single release, so a
# fresh rollup point release temporarily blocks any lockfile refresh
# until 30 days pass. The binaries themselves are precompiled artifacts
# whose source is the audited `rollup` package (which we already accept);
# excluding them from the policy is a small, contained relaxation.
minimumReleaseAgeExclude:
  - '@mionjs/core'
  - '@rollup/rollup-android-arm-eabi'
  - '@rollup/rollup-android-arm64'
  - '@rollup/rollup-darwin-arm64'
  - '@rollup/rollup-darwin-x64'
  - '@rollup/rollup-freebsd-arm64'
  - '@rollup/rollup-freebsd-x64'
  - '@rollup/rollup-linux-arm-gnueabihf'
  - '@rollup/rollup-linux-arm-musleabihf'
  - '@rollup/rollup-linux-arm64-gnu'
  - '@rollup/rollup-linux-arm64-musl'
  - '@rollup/rollup-linux-loong64-gnu'
  - '@rollup/rollup-linux-loong64-musl'
  - '@rollup/rollup-linux-powerpc64le-gnu'
  - '@rollup/rollup-linux-ppc64-musl'
  - '@rollup/rollup-linux-riscv64-gnu'
  - '@rollup/rollup-linux-riscv64-musl'
  - '@rollup/rollup-linux-s390x-gnu'
  - '@rollup/rollup-linux-x64-gnu'
  - '@rollup/rollup-linux-x64-musl'
  - '@rollup/rollup-openharmony-arm64'
  - '@rollup/rollup-win32-arm64-msvc'
  - '@rollup/rollup-win32-ia32-msvc'
  - '@rollup/rollup-win32-x64-msvc'
  - '@rollup/rollup-openbsd-x64'
  - '@rollup/rollup-win32-x64-gnu'
  - '@rollup/rollup-linux-ppc64-gnu'

# ── Block lifecycle scripts ──────────────────────────────
# Hard-block ALL build scripts. Specific packages are re-enabled
# via the `allowBuilds` map above.
ignoreScripts: true
sideEffectsCache: false

# ── Block non-registry sources ───────────────────────────
# Refuse git/github/file/http specifiers from dependencies.
# (workspace:* is exempt — it's the workspace protocol, not external.)
allowNonRegistryProtocols: false

# ── Strict peer / hoisting ───────────────────────────────
strictPeerDependencies: true
autoInstallPeers: false
# Use npm-like flat hoisting so transitive deps remain accessible from
# sibling packages without each one needing to redeclare them. Security is
# enforced by the lockfile + minimumReleaseAge + ignoreScripts settings
# above, NOT by the linker layout.
nodeLinker: hoisted
