<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ts-runtypes playground</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="icon" href="data:," />

    <!-- Monaco, served locally from the installed package (no CDN). -->
    <script src="/vs/loader.js"></script>
    <script>
      // Self-hosted worker bootstrap: proxy worker points back at our /vs/.
      window.MonacoEnvironment = {
        getWorkerUrl(_workerId, _label) {
          const src = `
            self.MonacoEnvironment = { baseUrl: '${location.origin}/vs/' };
            importScripts('${location.origin}/vs/base/worker/workerMain.js');
          `;
          return `data:text/javascript;charset=utf-8,${encodeURIComponent(src)}`;
        },
      };
      require.config({ paths: { vs: '/vs' } });
      window.__monacoReady = new Promise((resolve) => {
        require(['vs/editor/editor.main'], () => resolve(window.monaco));
      });
    </script>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="logo">ts-runtypes</span>
        <span class="tagline">playground</span>
      </div>
      <div class="status" id="status" data-state="loading">loading resolver…</div>
    </header>

    <main class="layout">
      <section class="pane editor-pane">
        <div class="pane-head">
          <h2>Type</h2>
          <span class="hint">define a <code>MyType</code></span>
        </div>
        <div id="editor" class="editor" aria-label="TypeScript type editor"></div>
      </section>

      <section class="pane control-pane">
        <div class="pane-head">
          <h2>Build function</h2>
        </div>
        <div class="controls">
          <label class="field">
            <span class="field-label">Function</span>
            <select id="operation" class="select" aria-label="Build function"></select>
          </label>
          <p class="blurb" id="op-blurb"></p>

          <div class="field input-field" id="input-field">
            <div class="field-label-row">
              <span class="field-label">Input (JSON)</span>
              <button type="button" class="ghost-btn" id="fill-sample">sample</button>
            </div>
            <div id="input-editor" class="input-editor" aria-label="JSON input"></div>
          </div>

          <button type="button" class="run-btn" id="run" disabled>Run</button>
        </div>
      </section>

      <section class="pane output-pane">
        <div class="pane-head">
          <h2>Output</h2>
          <span class="hint" id="timing"></span>
        </div>
        <div id="output" class="output" aria-live="polite"></div>
      </section>
    </main>

    <script type="module" src="/app.mjs"></script>
  </body>
</html>
