name: Pull the shared website+benchmark image
description: >
  Log in to GHCR and pull the prebuilt shared image, tagging it as the local
  working image (tsrt-website:dev). CI NEVER builds this image - it is produced
  and pushed from local (scripts/container/image.sh push). Fails the job if the
  image can't be pulled, so a missing/stale image is a clear signal to republish
  from local rather than a silent slow local rebuild.
  The calling job must grant `permissions: packages: read`.

runs:
  using: composite
  steps:
    - name: Log in to GHCR + pull the prebuilt shared image
      shell: bash
      run: |
        echo "${{ github.token }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin
        remote="ghcr.io/mionkit/tsrt-website:latest"
        if ! podman pull "$remote"; then
          echo "::error::Could not pull $remote. CI does not build the shared image - rebuild it and run 'bash scripts/container/image.sh push' from local, then retry." >&2
          exit 1
        fi
        podman tag "$remote" tsrt-website:dev
        echo "pulled $remote -> tsrt-website:dev"
