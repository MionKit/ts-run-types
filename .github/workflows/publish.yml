name: prod · publish

# Fires when a release PR lands on prod. Runs the IDENTICAL release gate (build +
# 7-platform e2e + benchmarks + website build), then - only if all of it passes -
# STAGES every package to npm via Trusted Publishing (OIDC, no NPM_TOKEN) and tags
# the release. Staging uploads to npm's stage queue WITHOUT 2FA, so CI never holds
# a 2FA-capable credential; a maintainer then promotes each package to live with a
# real 2FA challenge, leaves-first (`pnpm rtx release stage-approve`). Only after
# that approval are the packages live.
#
# The docs-site deploy is a SEPARATE, manually-triggered workflow
# (website-deploy.yml): run it AFTER the stage-ids are approved. Under staging
# `publish-npm` finishing means "staged", not "live", so the deploy can no longer
# hang off `needs: publish-npm`.
#
# VERSION MODEL: the release PR into prod MUST carry the bumped version (committed
# version.json + package.json files, e.g. via `node scripts/release/bump-version.mjs`). CI
# reads the version from the gate's build job output and tags exactly that.
on:
  push:
    branches: [prod]

permissions:
  contents: read

# Serialize release runs on the prod ref; a newer prod push supersedes an
# in-flight run (never cancels one mid-stage).
concurrency:
  group: release-prod
  cancel-in-progress: false

jobs:
  gate:
    uses: ./.github/workflows/release-gate.yml

  publish-npm:
    name: stage-publish to npm + tag
    needs: gate
    runs-on: ubuntu-latest
    # The GH `release` environment gate is now COMPLEMENTARY: the authoritative
    # human gate is npm's 2FA stage approval (see the header + website-deploy.yml).
    environment: release
    permissions:
      contents: write # push the release tag
      id-token: write # npm Trusted Publishing (OIDC) + automatic provenance
    env:
      VERSION: ${{ needs.gate.outputs.version }}
      # Provenance needs a PUBLIC source repo (npm refuses it from a private one), so
      # it's OFF by default. When this repo goes public, set repo variable
      # RT_NPM_PROVENANCE=1 (Settings -> Secrets and variables -> Actions -> Variables)
      # to re-enable it — no code change.
      RT_NPM_PROVENANCE: ${{ vars.RT_NPM_PROVENANCE }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history + tags so git-cliff can build the release notes
      - uses: actions/setup-node@v5
        with:
          node-version: 26
      # Staged publishing needs npm >= 11.15.0 (Trusted Publishing/OIDC needs
      # >= 11.5.1). Node 26's bundled npm may predate that — upgrade to be safe.
      - name: Ensure npm supports staged publishing (>= 11.15.0)
        shell: bash
        run: |
          npm install -g npm@latest
          npm --version
      - uses: actions/download-artifact@v8
        with:
          name: tarballs
          path: tarballs
      - name: Preflight - refuse to re-stage an existing version
        shell: bash
        run: |
          # A missed bump would otherwise 409 mid-sequence after some platform
          # packages already staged/published. Fail early and cleanly instead.
          if npm view "@ts-runtypes/core@${VERSION}" version >/dev/null 2>&1; then
            echo "@ts-runtypes/core@${VERSION} is already on npm. Bump version.json on the release PR." >&2
            exit 1
          fi
      # Trusted Publishing (OIDC), so NO NPM_TOKEN. `npm stage publish` uploads
      # every package to npm's stage queue (no 2FA); a maintainer then approves
      # each with a live 2FA challenge, leaves-first (`pnpm rtx release
      # stage-approve`). Provenance rides RT_NPM_PROVENANCE (off by default — the
      # repo is private; flip the repo variable to 1 once it's public).
      #
      # Routed through the rtx front door (== `pnpm rtx release tarballs`). rtx is
      # zero-dep (node: built-ins only), so `node scripts/rt.mjs` runs in this
      # deliberately pnpm-free publish job; `pnpm rtx` would need pnpm on PATH.
      - name: Stage-publish to npm (platform packages first, launcher, then FE)
        run: node scripts/rt.mjs release tarballs
      - name: Tag the release (idempotent)
        shell: bash
        run: |
          # Guard so a publish re-run (e.g. retried env approval) doesn't die on a
          # pre-existing tag after the stage-publish already succeeded.
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "tag v${VERSION} already exists, skipping"
          else
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
          fi
      - name: Generate release notes for the new tag (git-cliff)
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
      - name: Create the GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "v${VERSION}" --title "v${VERSION}" --notes-file RELEASE_NOTES.md
        # The run ends at "packages staged + tagged + GitHub Release drafted". A
        # maintainer approves the stage-ids with 2FA (`pnpm rtx release
        # stage-approve`), then triggers website-deploy.yml to ship the docs.
