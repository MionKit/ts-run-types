name: prod · pre-publish checks

# Gate on every PR that targets prod (the release line). Runs the full reusable
# release gate (build all packages + binaries, install the packed artifacts from
# a local registry and run the consumer e2e on each platform, plus benchmarks and
# the static website build). No publish, no secrets - safe for fork PRs.
on:
  pull_request:
    branches: [prod]

permissions:
  contents: read

jobs:
  gate:
    # A called workflow can never exceed the calling job's permissions, and the
    # reusable gate's e2e / benchmarks / website-build jobs request
    # `packages: read` (to pull the prebuilt GHCR image). Grant it here or the
    # run fails at startup. Kept in sync with publish.yml's gate job.
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/release-gate.yml
