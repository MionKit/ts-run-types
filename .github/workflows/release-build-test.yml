name: release · build & test

# Reusable. Builds every package + the 7-platform binary matrix, runs the full
# source suite (Go + JS) on Linux, then installs the PUBLISHED packages from a
# local verdaccio and runs the consumer e2e — one full run per OS, plus a cheap
# exec-smoke for the Linux side-arches.
#
# Coverage rationale: the Go resolver is pure (CGO_ENABLED=0, deterministic, no
# platform-specific code), so cross-compilation is trusted for the ARCH axis;
# the real per-platform risk is OS plumbing (launcher .exe/long-path resolution,
# path handling, process spawn, CRLF) — which is per-OS, not per-arch. So:
#   - full e2e on one runner per OS: linux-x64, darwin-arm64, win32-x64
#   - exec-smoke (QEMU) on linux-arm64 + linux-arm
#   - darwin-x64 + win32-arm64 are built + published but not exercised here
#     (no common runner; Go cross-compile is trusted for the binary itself).
on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: build + full source suite + pack
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/bootstrap
      - id: version
        shell: bash
        run: echo "version=$(node -p "require('./lerna.json').version")" >> "$GITHUB_OUTPUT"
      - name: Go test suite
        run: go test ./internal/...
      - name: Full JS suite (builds the resolver + dists via pretest)
        run: pnpm test
      - name: Build FE dists (canonical, for packing)
        run: pnpm run build
      - name: Cross-compile the 7-platform binary packages
        run: node scripts/build-binary-packages.mjs
      - name: Pack every package into tarballs/
        run: node scripts/pack-artifacts.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: tarballs
          path: tarballs/
          retention-days: 3

  e2e:
    name: e2e ${{ matrix.pkg }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - {runner: ubuntu-latest, pkg: linux-x64}
          - {runner: macos-14, pkg: darwin-arm64}
          - {runner: windows-latest, pkg: win32-x64}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/download-artifact@v4
        with:
          name: tarballs
          path: tarballs
      - uses: ./.github/actions/verdaccio-publish
      - name: e2e (install published packages + run the suite)
        working-directory: e2e
        shell: bash
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          npm install \
            "ts-runtypes@$VERSION" \
            "vite-plugin-runtypes@$VERSION" \
            vite@5.4.10 vitest@2.1.9 \
            --registry http://127.0.0.1:4873
          npm test

  smoke:
    name: exec-smoke linux/${{ matrix.pkg }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - {platform: linux/arm64, pkg: linux-arm64}
          - {platform: linux/arm/v6, pkg: linux-arm}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: tarballs
          path: tarballs
      - uses: docker/setup-qemu-action@v3
      - name: Exec the ${{ matrix.pkg }} binary under QEMU
        run: |
          # Extract just the binary (package/lib/ts-runtypes) from its tarball.
          mkdir -p bin-rt
          tar -xzf tarballs/ts-runtypes-binary-${{ matrix.pkg }}-*.tgz -C bin-rt --strip-components=2 package/lib/ts-runtypes
          # Static CGO-free binary runs on a minimal image; --version proves it
          # executes on this arch and prints the embedded version + tsgo revision.
          docker run --rm --platform ${{ matrix.platform }} \
            -v "$PWD/bin-rt:/rt" debian:bookworm-slim /rt/ts-runtypes --version
