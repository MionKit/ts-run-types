# Runs the validation benchmarks in the SAME isolated podman image used locally.
# Mirrors `pnpm run bench:prep` + the image build + `pnpm run bench`, so CI and
# local never drift. The image is the single shared website+benchmark image:
# benchmarks live at /bench (the website at /app), built once by scripts/podman-website.sh,
# so `benchmarks.sh build-image` here just delegates to that build. Requires the ts-runtypes
# toolchain (Go + the tsgolint submodule bootstrap) to build the resolver binary
# the benchmark mounts.
name: benchmarks

# DISABLED for now — manual-only so it doesn't run on every push/PR.
# Re-enable automatic runs by restoring the push/pull_request triggers below:
#   on:
#     push: { branches: [main], paths: ['container/benchmarks/**', 'scripts/benchmarks.sh', '.github/workflows/benchmarks.yml'] }
#     pull_request: { paths: ['container/benchmarks/**', 'scripts/benchmarks.sh', '.github/workflows/benchmarks.yml'] }
on:
  workflow_dispatch:

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Apply tsgolint patches to typescript-go
        run: |
          # Apply to the working tree with `git apply` (no commits → no committer
          # identity needed). `git am` would record commits and fail on CI with
          # "empty ident name". --3way matches the documented `git am --3way`
          # fallback; the build reads the patched working-tree files.
          cd third_party/tsgolint/typescript-go
          git apply --3way ../patches/*.patch

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      # Builds the Go resolver binary + the marker/plugin packages on the runner.
      - name: Prep ts-runtypes toolchain
        run: bash scripts/benchmarks.sh prep

      # podman ships preinstalled on ubuntu-latest runners. Builds the single
      # shared image (delegates to scripts/podman-website.sh build-image).
      - name: Build the shared website+benchmark image
        run: bash scripts/benchmarks.sh build-image

      - name: Run the benchmark (build + run, in the container)
        run: bash scripts/benchmarks.sh bench

      - name: Type-checking cost (TS type instantiations)
        run: bash scripts/benchmarks.sh typecost
