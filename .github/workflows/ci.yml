name: ci

# The gate on main (the stable development branch). Runs on every PR to main and
# on push to main (post-merge confirmation).
#
# The heavy work is split across TWO balanced jobs on their own runners. The Go
# suite is lighter than the full JS/vitest suite, so the heavy JS *fuzz* tests
# ride the Go runner to even the two out:
#   go-fuzz — Go suite (gofmt/vet/test) + the JS fuzz suite (test/fuzz/**)
#   js-lint — check-format + lint/typecheck + the rest of the JS suite
# `vitest run test/fuzz` and `vitest run --exclude '**/test/fuzz/**'` are a
# complete, DISJOINT partition of the suite (23 + 151 = 174 files), so no test is
# dropped or double-run — a semantic split by directory instead of a hash shard.
# (This used to be Go+shard-1 vs lint+shard-2 with `vitest --shard`; once oxlint
# replaced the much heavier ESLint the lint side went light, so the even shards
# left the Go job overloaded. Moving the fuzz suite — the JS heavyweight — onto
# the otherwise-light Go runner rebalances.) Each job re-runs `bootstrap`, which
# restores the shared, tsgolint-keyed Go build cache, so the tsgo compile is a
# cache hit and the per-job resolver build is fast, not minutes.
#
# A FOURTH job, `smoke`, runs the website serves-a-page + benchmark
# competitor-build checks. It is path-gated (only when container inputs change,
# decided by the tiny `changes` job) and runs in PARALLEL with the verify jobs
# instead of tailing them. It NEVER builds the shared image: it PULLS the
# prebuilt one (competitor node_modules baked in) and mounts our freshly built
# binary; if the image can't be pulled the job fails (rebuild + push it from
# local — it is not a CI artifact). typia is skipped (RT_BENCH_NO_TYPIA) for now
# because its native plugin compiles ~200s at run time and is not yet baked into
# the image; the prod gate's `benchmarks` job exercises typia.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── go-fuzz: Go suite + the JS fuzz suite ─────────────────────────────────
  # The Go suite (vet + test) is the wall floor here; the JS fuzz tests (the JS
  # heavyweight) ride along on this otherwise-Go-bound runner to balance it
  # against js-lint.
  go-fuzz:
    name: go tests + fuzz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: ./.github/actions/bootstrap
      # Fail-fast: cheap checks first. gofmt is instant; vet compiles (cache-warm)
      # and warms the compile cache the go-test + resolver-build steps reuse.
      - name: Go formatting (our code only; never third_party)
        run: |
          unformatted="$(gofmt -l cmd internal)"
          if [ -n "$unformatted" ]; then
            echo "These Go files are not gofmt-clean (run: gofmt -w cmd internal):" >&2
            echo "$unformatted" >&2
            exit 1
          fi
      - name: Go vet (our code only; never third_party)
        run: go vet ./cmd/... ./internal/...
      - name: Go test suite
        run: go test ./internal/...
      # The fuzz tests spawn the binary and read the dists — build first
      # (cache-warm from go test/vet, so ~fast).
      - name: Build the resolver + dists (spawned/read by the fuzz suite)
        run: pnpm run check:builds
      - name: JS fuzz suite (test/fuzz/** — 23 files)
        run: pnpm exec vitest run test/fuzz

  # ── js-lint: the rest of the JS suite + lint/typecheck/format ─────────────
  # Everything except the fuzz suite runs here, plus the static checks. Together
  # with go-fuzz this is a complete, disjoint partition of the JS suite.
  js-lint:
    name: js tests + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: ./.github/actions/bootstrap
      # Fail-fast ordering — cheap checks before the suite.
      - name: Check formatting (no build needed — runs first)
        run: pnpm run check-format
      # `pnpm run lint` runs typecheck, which reads the built dists; the JS suite
      # also spawns the binary — one build feeds both.
      - name: Build the resolver + dists (needed by lint + the JS suite)
        run: pnpm run check:builds
      - name: Lint + typecheck
        run: pnpm run lint
      - name: JS suite (everything except test/fuzz — 151 files)
        run: pnpm exec vitest run --exclude '**/test/fuzz/**'

  # Decides WHETHER the container smoke runs (container inputs / driver scripts
  # changed). Kept as its own tiny job so `smoke` can gate on it without a
  # bootstrap, and so a non-container PR never spins up a smoke runner at all.
  changes:
    name: detect container changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      smoke: ${{ steps.filter.outputs.smoke }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            smoke:
              - 'container/**'
              - 'scripts/website.sh'
              - 'scripts/benchmarks.sh'
              - 'scripts/podman-website.sh'
              - 'scripts/lib-container.sh'
              - 'scripts/lib-ghcr.sh'

  # Path-gated container smoke, parallel with the verify jobs. Self-contained: it
  # builds its own resolver + linux binaries for the container mounts, then pulls
  # the prebuilt shared image (CI never builds it).
  smoke:
    name: container smoke
    needs: changes
    if: needs.changes.outputs.smoke == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: ./.github/actions/bootstrap
      - name: Build the resolver + linux binaries for the container mounts
        run: bash scripts/check-stale-builds.sh all linux-go linux-extract
      - name: Pull the prebuilt shared image (CI never builds it)
        uses: ./.github/actions/pull-shared-image
      - name: Website serves-a-page smoke
        run: pnpm run website:smoke
      # RT_BENCH_NO_TYPIA stays until the prebuilt image BAKES typia's .ttsc plugin (a
      # local image change + republish); a no-.ttsc image would otherwise recompile
      # it ~200s here. Drop this once that image is live.
      - name: Benchmark competitor-build smoke
        env:
          RT_BENCH_NO_TYPIA: '1'
        run: pnpm run bench:smoke
