name: ci

# The gate on main (the stable development branch). Runs on every PR to main and
# on push to main (post-merge confirmation). ONE job, `verify`:
#   1. Go tests + gofmt/vet, the full JS suite (which builds the resolver binary
#      + dists via pretest and runs the fuzz integration specs at default
#      iteration counts), lint + typecheck, format.
#   2. THEN, only when container inputs change (path-gated), a website
#      serves-a-page + benchmark competitor-build smoke. It reuses the bootstrap,
#      Go binary, and dists already built above instead of standing up a second
#      job that repeats that work. The smoke PULLS the prebuilt shared image
#      (competitor node_modules are baked in) and mounts our freshly built binary,
#      so it skips the dep install. It only forces a fresh LOCAL image build when
#      the baked deps themselves change (the `image` filter), and otherwise falls
#      back to a local build if the image can't be pulled. typia is skipped
#      (BENCH_NO_TYPIA) because its native plugin compiles ~200s at run time and is
#      neither baked into the image nor cached across CI runs; the prod gate's
#      `benchmarks` job is where typia is exercised.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    # Job-level permissions REPLACE the workflow default, so every needed scope is
    # listed: contents:read (checkout), packages:read (pull the prebuilt GHCR
    # image), pull-requests:read (paths-filter on PRs).
    permissions:
      contents: read
      packages: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: ./.github/actions/bootstrap
      - name: Go test suite
        run: go test ./internal/...
      - name: Go formatting + vet (our code only; never third_party)
        run: |
          unformatted="$(gofmt -l cmd internal)"
          if [ -n "$unformatted" ]; then
            echo "These Go files are not gofmt-clean (run: gofmt -w cmd internal):" >&2
            echo "$unformatted" >&2
            exit 1
          fi
          go vet ./cmd/... ./internal/...
      # pretest (check-stale-builds.sh) builds bin/ts-runtypes + the marker/plugin
      # dists; the run includes the *.integration.test.ts fuzz specs.
      - name: Full JS suite (builds the resolver + dists via pretest; runs fuzz)
        run: pnpm test
      # Runs after pnpm test so the dists typecheck reads are already in place.
      - name: Lint + typecheck
        run: pnpm run lint
      - name: Check formatting
        run: pnpm run check-format

      # --- container smoke: path-gated, reuses everything built above ----------
      # `smoke`  = run the smoke at all (container inputs / driver scripts changed).
      # `image`  = the BAKED deps changed (a _deps manifest or the Containerfile),
      #            so the prebuilt image is stale -> force a fresh local build.
      - name: Detect container changes
        uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            smoke:
              - 'container/**'
              - 'scripts/website.sh'
              - 'scripts/benchmarks.sh'
              - 'scripts/podman-website.sh'
              - 'scripts/lib-container.sh'
              - 'scripts/lib-ghcr.sh'
            image:
              - 'container/**/_deps/**'
              - 'container/website/Containerfile'
      # Best-effort GHCR login so the prebuilt image pulls (vs a slow local build).
      # Non-fatal: if it fails or the image isn't accessible, ensure_image falls
      # back to a local build automatically.
      - name: Log in to GHCR (for the prebuilt shared image)
        if: steps.changes.outputs.smoke == 'true'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin || echo "GHCR login failed; smoke will fall back to a local image build"
      # USE_LOCAL is set ONLY when the baked deps changed, so a normal container
      # change pulls the prebuilt image (deps baked, our binary mounted on top)
      # and a deps change rebuilds the image fresh. website:smoke reads
      # WEBSITE_USE_LOCAL; bench:smoke reads BENCH_USE_LOCAL.
      - name: Website serves-a-page smoke
        if: steps.changes.outputs.smoke == 'true'
        env:
          WEBSITE_USE_LOCAL: ${{ steps.changes.outputs.image == 'true' && '1' || '' }}
        run: pnpm run website:smoke
      # BENCH_NO_TYPIA: typia's native plugin compiles ~200s at build time into a
      # .ttsc volume that does NOT persist across CI runs (and is not baked into the
      # image), so it would recompile every run. Skip it in this fast smoke; the
      # prod gate's `benchmarks` job exercises typia before release.
      - name: Benchmark competitor-build smoke
        if: steps.changes.outputs.smoke == 'true'
        env:
          BENCH_USE_LOCAL: ${{ steps.changes.outputs.image == 'true' && '1' || '' }}
          BENCH_NO_TYPIA: '1'
        run: pnpm run bench:smoke
