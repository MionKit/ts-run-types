name: ci

# The gate on main (the stable development branch). Runs on every PR to main and
# on push to main (post-merge confirmation).
#
# The heavy work is split across TWO balanced jobs on their own runners. The Go
# suite is lighter than the full JS/vitest suite, so the heavy JS *fuzz* tests
# ride the Go runner to even the two out:
#   go-fuzz — Go suite (gofmt/vet/test) + the JS fuzz suite (test/fuzz/**)
#   js-lint — check-format + lint/typecheck + the rest of the JS suite
# Both are PATH-GATED via the `changes` job (dorny/paths-filter), same mechanism
# as `smoke`: they run only when Go (ts-go-runtypes/**) or JS (packages/** + root
# JS config + scripts) files change, so a docs-only PR skips both. Inside go-fuzz
# the gofmt/vet/go-test steps are additionally gated on the Go filter, so a
# packages-only change runs the fuzz half without re-running the Go suite. (A Go
# change still runs js-lint too: typecheck compiles the ts-go-runtypes testfixtures.)
# `vitest run test/fuzz` and `vitest run --exclude '**/test/fuzz/**'` are a
# complete, DISJOINT partition of the suite (23 + 151 = 174 files), so no test is
# dropped or double-run — a semantic split by directory instead of a hash shard.
# (This used to be Go+shard-1 vs lint+shard-2 with `vitest --shard`; once oxlint
# replaced the much heavier ESLint the lint side went light, so the even shards
# left the Go job overloaded. Moving the fuzz suite — the JS heavyweight — onto
# the otherwise-light Go runner rebalances.) Each job re-runs `bootstrap`, which
# restores the shared, tsgolint-keyed Go build cache, so the tsgo compile is a
# cache hit and the per-job resolver build is fast, not minutes.
#
# A FOURTH job, `smoke`, runs the website serves-a-page + benchmark
# competitor-build checks. It is path-gated (only when container inputs change,
# decided by the tiny `changes` job) and runs in PARALLEL with the verify jobs
# instead of tailing them. It NEVER builds the shared image: it PULLS the
# prebuilt one (competitor node_modules baked in) and mounts our freshly built
# binary; if the image can't be pulled the job fails (rebuild + push it from
# local — it is not a CI artifact). typia is skipped (RT_BENCH_NO_TYPIA) for now
# because its native plugin compiles ~200s at run time and is not yet baked into
# the image; the prod gate's `benchmarks` job exercises typia.
#
# A FIFTH job, `commitlint`, gates PR commit messages against Conventional
# Commits. It is PR-only and light (no submodules/Go): the auto-changelog
# (git-cliff) is generated from those messages, so every commit that lands must
# conform. This is the SERVER-SIDE gate — the local .husky/commit-msg hook only
# fires on clones that ran `pnpm exec husky` (ignoreScripts blocks husky's
# prepare from auto-wiring), so CI is what actually enforces it.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── go-fuzz: Go suite + the JS fuzz suite ─────────────────────────────────
  # The Go suite (vet + test) is the wall floor here; the JS fuzz tests (the JS
  # heavyweight) ride along on this otherwise-Go-bound runner to balance it
  # against js-lint.
  go-fuzz:
    name: go tests + fuzz
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.pkg == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: ./.github/actions/bootstrap
      # Fail-fast: cheap checks first. gofmt is instant; vet compiles (cache-warm)
      # and warms the compile cache the go-test + resolver-build steps reuse.
      # Go-specific steps run only when the Go tree changed; a packages-only
      # change still runs the fuzz half below (which spawns the binary).
      - name: Go formatting (our code only; never third_party)
        if: needs.changes.outputs.go == 'true'
        working-directory: ts-go-runtypes
        run: |
          unformatted="$(gofmt -l cmd internal)"
          if [ -n "$unformatted" ]; then
            echo "These Go files are not gofmt-clean (run: pnpm run format):" >&2
            echo "$unformatted" >&2
            exit 1
          fi
      - name: Go vet (our code only; never third_party)
        if: needs.changes.outputs.go == 'true'
        working-directory: ts-go-runtypes
        run: go vet ./cmd/... ./internal/...
      - name: Go test suite
        if: needs.changes.outputs.go == 'true'
        working-directory: ts-go-runtypes
        run: go test ./internal/...
      # The fuzz tests spawn the binary and read the dists — build first
      # (cache-warm from go test/vet, so ~fast).
      - name: Build the resolver + dists (spawned/read by the fuzz suite)
        run: pnpm run check:builds
      - name: JS fuzz suite (test/fuzz/** — 23 files)
        run: pnpm exec vitest run test/fuzz
      # enrichRace self-skips unless RT_FUZZ_RACE=1 (scripts audit §3.4); the
      # test/fuzz run above never sets it, so the concurrency coverage rides here.
      # Equivalent to `pnpm rtx core fuzz race`.
      - name: Concurrent CLI race fuzz (RT_FUZZ_RACE gate)
        run: RT_FUZZ_RACE=1 pnpm exec vitest run enrichRace

  # ── js-lint: the rest of the JS suite + lint/typecheck/format ─────────────
  # Everything except the fuzz suite runs here, plus the static checks. Together
  # with go-fuzz this is a complete, disjoint partition of the JS suite.
  js-lint:
    name: js tests + lint
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.pkg == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: ./.github/actions/bootstrap
      # Fail-fast ordering — cheap checks before the suite.
      - name: Check formatting (no build needed — runs first)
        run: pnpm run check-format
      # `pnpm run lint` runs typecheck, which reads the built dists; the JS suite
      # also spawns the binary — one build feeds both.
      - name: Build the resolver + dists (needed by lint + the JS suite)
        run: pnpm run check:builds
      # The committed Go→TS mirrors have no other CI drift gate and can silently
      # rot (scripts audit §3.3): regenerate + format them and fail on any diff.
      # rtx owns the generator list, so a new mirror is picked up here for free.
      - name: Codegen drift (Go→TS mirrors must be in sync)
        run: pnpm rtx core codegen all --check
      - name: Lint + typecheck
        run: pnpm run lint
      - name: JS suite (everything except test/fuzz — 151 files)
        run: pnpm exec vitest run --exclude '**/test/fuzz/**'

  # ── commitlint: Conventional Commits gate on the PR's commits ──────────────
  # Validates every commit in the PR range against commitlint.config.js. PR-only
  # (github.event_name gate) — a push to main carries commits already vetted here
  # via their PR. Deliberately light: no submodules, no Go, no resolver build —
  # just the deps commitlint needs (ignoreScripts blocks any build scripts).
  commitlint:
    name: commit messages
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 26
          cache: pnpm
      - name: Install deps (commitlint only needs the JS workspace)
        run: pnpm install --frozen-lockfile
      - name: Lint PR commit messages (Conventional Commits)
        run: >-
          pnpm exec commitlint --verbose
          --from ${{ github.event.pull_request.base.sha }}
          --to ${{ github.event.pull_request.head.sha }}

  # Decides WHICH heavy jobs run, by path: `smoke` (the website/benchmarks apps +
  # their drivers), `go` (the Go tree), and `pkg` (JS packages + root JS config +
  # scripts). Kept as its own tiny job so the gated jobs can `needs:` it without a
  # bootstrap, and so a docs-only PR never spins up a heavy runner at all.
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      smoke: ${{ steps.filter.outputs.smoke }}
      go: ${{ steps.filter.outputs.go }}
      pkg: ${{ steps.filter.outputs.pkg }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            smoke:
              # Only the two apps the smoke actually builds — NOT the pre-publish-e2e
              # fixture (that is exercised by release-gate, not ci).
              - 'container/website/**'
              - 'container/benchmarks/**'
              - 'scripts/core/build.mjs'
              - 'scripts/website/**'
              - 'scripts/container/**'
              - 'scripts/lib/**'
            go:
              - 'ts-go-runtypes/**'
              - '.github/actions/bootstrap/**'
            pkg:
              - 'packages/**'
              - 'scripts/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.json'
              - 'vitest.config.ts'
              - '.github/actions/bootstrap/**'

  # Path-gated container smoke, parallel with the verify jobs. Self-contained: it
  # builds its own resolver + linux binaries for the container mounts, then pulls
  # the prebuilt shared image (CI never builds it).
  smoke:
    name: container smoke
    needs: changes
    if: needs.changes.outputs.smoke == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      # Reclaim ~15-25 GB of preinstalled cruft before the multi-GB image pull +
      # Go build-cache restore, so the runner's root fs doesn't fill up.
      - uses: ./.github/actions/free-disk
      - uses: ./.github/actions/bootstrap
      - name: Build the resolver + linux binaries for the container mounts
        run: pnpm rtx core build all linux-go linux-extract
      - name: Pull the prebuilt shared image (CI never builds it)
        uses: ./.github/actions/pull-shared-image
      # Reuse the playground wasm so a PR that only touches the website / playground
      # UI doesn't pay the ~8-min rebuild.
      - name: Cache the playground wasm
        uses: ./.github/actions/cache-playground-wasm
      - name: Website serves-a-page smoke
        run: pnpm rtx website check
      # RT_BENCH_NO_TYPIA stays until the prebuilt image BAKES typia's .ttsc plugin (a
      # local image change + republish); a no-.ttsc image would otherwise recompile
      # it ~200s here. Drop this once that image is live.
      - name: Benchmark competitor-build smoke
        env:
          RT_BENCH_NO_TYPIA: '1'
        run: pnpm rtx bench smoke
