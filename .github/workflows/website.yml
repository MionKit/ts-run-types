# Builds the docs website in the SAME isolated podman image used locally, so CI
# and local development never drift ("works on my machine" can't happen: the
# node_modules tree is identical because it comes from the same Containerfile +
# frozen lockfile). That image is the single shared website+benchmark image
# (website deps at /app, benchmark deps at /bench), so one build serves both.
# Runs only when website inputs change.
name: website

# DISABLED for now — manual-only so it doesn't run on every push/PR.
# Re-enable automatic runs by restoring the push/pull_request triggers below:
#   on:
#     push: { branches: [main], paths: ['container/website/**', 'scripts/website.sh', '.github/workflows/website.yml'] }
#     pull_request: { paths: ['container/website/**', 'scripts/website.sh', '.github/workflows/website.yml'] }
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # podman ships preinstalled on ubuntu-latest GitHub runners.
      - name: podman version
        run: podman --version

      # Identical to `pnpm run podman-website:build-image` locally. Builds the single
      # shared image (website deps at /app, benchmark deps at /bench).
      - name: Build the shared website+benchmark image
        run: bash scripts/podman-website.sh build-image

      # Identical to `pnpm run website:build` locally — produces container/website/.output.
      - name: Production build inside the container
        run: bash scripts/website.sh build

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: website-output
          path: container/website/.output
          if-no-files-found: error
