name: prod · release gate

# Reusable gate shared by pre-publish.yml (PR -> prod) and publish.yml (push ->
# prod), so a release PR and the merge that lands it run the IDENTICAL checks:
#   build         - the full main gate (Go suite + gofmt/vet, JS suite incl. fuzz,
#                   lint, typecheck, format) on Linux, then build every package + the
#                   7-platform binary matrix and pack the tarballs.
#   e2e           - install the PUBLISHED packages from a local verdaccio and run
#                   the consumer suite, one full run per OS, plus a cheap
#                   exec-smoke for the Linux side-arches.
#   benchmarks    - the validation + type-cost benchmarks in the shared podman
#                   image (locally built, no GHCR auth needed).
#   website-build - the static docs site builds in the shared podman image.
#
# Coverage rationale (e2e): the Go resolver is pure (CGO_ENABLED=0, deterministic,
# no platform-specific code), so cross-compilation is trusted for the ARCH axis;
# the real per-platform risk is OS plumbing (launcher .exe/long-path resolution,
# path handling, process spawn, CRLF) - which is per-OS, not per-arch. So:
#   - full e2e on one runner per OS: linux-x64, darwin-arm64, win32-x64
#   - exec-smoke (QEMU) on linux-arm64 + linux-arm
#   - darwin-x64 + win32-arm64 are built + published but not exercised here
#     (no common runner; Go cross-compile is trusted for the binary itself).
#
# The `version` output (read from version.json by the build job) is surfaced to the
# caller so publish.yml tags the SAME version the gate built - never a fresh
# version.json read that could drift from the packed artifact.
on:
  workflow_call:
    outputs:
      version:
        description: 'Release version read from version.json by the build job'
        value: ${{ jobs.build.outputs.version }}
  # On-demand runs of the WHOLE gate (build + e2e + smoke + benchmarks +
  # website-build) on any branch, with NO publish - the "run the full workflow
  # except the publish task" path. `gh workflow run release-gate.yml --ref <branch>`.
  # Uses the repo's secrets directly (GHCR_PAT), so the private-image pulls work.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build + full source suite + pack
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: ./.github/actions/bootstrap
      - id: version
        shell: bash
        run: echo "version=$(node -p "require('./version.json').version")" >> "$GITHUB_OUTPUT"
      - name: Go test suite
        working-directory: ts-go-runtypes
        run: go test ./internal/...
      - name: Go formatting + vet (our code only; never third_party)
        working-directory: ts-go-runtypes
        run: |
          unformatted="$(gofmt -l cmd internal)"
          if [ -n "$unformatted" ]; then
            echo "These Go files are not gofmt-clean (run: pnpm run format):" >&2
            echo "$unformatted" >&2
            exit 1
          fi
          go vet ./cmd/... ./internal/...
      # Prod parity with ci.yml: the committed Go→TS mirrors must stay in sync.
      # Equivalent to `pnpm rtx core codegen all --check`.
      - name: Codegen drift (Go→TS mirrors must be in sync)
        run: |
          pnpm run gen:ts-constants
          pnpm run gen:run-type-kind
          pnpm exec oxfmt --write \
            packages/ts-runtypes-devtools/src/runtypes-constants.generated.ts \
            packages/ts-runtypes/src/runTypeKind.ts
          pnpm run gen:diag-catalog
          git diff --exit-code -- \
            packages/ts-runtypes-devtools/src/runtypes-constants.generated.ts \
            packages/ts-runtypes/src/runTypeKind.ts \
            packages/ts-runtypes-devtools/src/diagnosticCatalog.generated.ts \
            container/website/app/components/content/diagnostics-catalog.json
      - name: Full JS suite (builds the resolver + dists via pretest; runs fuzz)
        run: pnpm test
      # pnpm test above never sets RT_FUZZ_RACE, so enrichRace self-skips there;
      # the concurrency coverage rides here. Equivalent to `pnpm rtx core fuzz race`.
      - name: Concurrent CLI race fuzz (RT_FUZZ_RACE gate)
        run: RT_FUZZ_RACE=1 pnpm exec vitest run enrichRace
      # Re-run the full main gate here too (lint/typecheck/format) so a prod PR
      # catches anything that ever slipped onto main; runs after pnpm test so the
      # dists the typecheck reads are already built.
      - name: Lint + typecheck
        run: pnpm run lint
      - name: Check formatting
        run: pnpm run check-format
      - name: Build FE dists (canonical, for packing)
        run: pnpm run build
      - name: Cross-compile the 7-platform binary packages
        run: pnpm rtx release binaries
      - name: Pack every package into tarballs/
        run: pnpm rtx release pack
      - uses: actions/upload-artifact@v7
        with:
          name: tarballs
          path: tarballs/
          # Long enough that a slow `release` environment approval on the publish
          # side can still download the exact bytes the e2e validated.
          retention-days: 14

  e2e:
    name: e2e ${{ matrix.pkg }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          # ubuntu runs the full multi-bundler feature matrix + the host-native
          # smoke against a CONTAINERIZED verdaccio (the shared image's baked
          # registry). mac/win can't run a Linux container (L2), so they take the
          # CI-guarded host-npx fallback: on-runner verdaccio + the per-OS
          # host-native binary smoke only (the bundler matrix is OS-agnostic and
          # does not repeat per-OS).
          - {runner: ubuntu-latest, pkg: linux-x64, backend: container}
          - {runner: macos-14, pkg: darwin-arm64, backend: host-npx}
          - {runner: windows-latest, pkg: win32-x64, backend: host-npx}
    runs-on: ${{ matrix.runner }}
    # packages:read lets the container backend (ubuntu) pull the prebuilt shared image.
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v5
      # Reclaim preinstalled cruft before the image pull (ubuntu container lane only).
      - uses: ./.github/actions/free-disk
        if: matrix.backend == 'container'
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 26
      - uses: actions/download-artifact@v8
        with:
          name: tarballs
          path: tarballs
      # CI never builds the images; the container backend pulls the prebuilt e2e
      # image (verdaccio + the builder toolchains). e2e.mjs's own ensureImage then
      # sees the digest already matches and skips a second pull.
      - name: Pull the prebuilt e2e image (container backend only)
        if: matrix.backend == 'container'
        uses: ./.github/actions/pull-shared-image
        with:
          remote: ghcr.io/mionkit/tsrt-e2e:latest
          local-tag: tsrt-e2e:dev
          # tsrt-e2e is a PRIVATE package the repo's GITHUB_TOKEN can't read; the
          # PAT (read:packages) can. Passed via `secrets: inherit` on the gate call.
          password: ${{ secrets.GHCR_PAT }}
      # The ONE front door — same script locally and on every lane, so they can't
      # drift. tarballs/ is the downloaded artifact, so e2e.mjs skips the build.
      - name: Pre-publish e2e (${{ matrix.backend }})
        run: pnpm rtx release e2e --backend ${{ matrix.backend }}

  smoke:
    name: exec-smoke linux/${{ matrix.pkg }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - {platform: linux/arm64, pkg: linux-arm64}
          - {platform: linux/arm/v6, pkg: linux-arm}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: tarballs
          path: tarballs
      - uses: docker/setup-qemu-action@v4
      - name: Exec the ${{ matrix.pkg }} binary under QEMU
        run: |
          # Extract just the binary (package/lib/ts-runtypes) from its tarball.
          mkdir -p bin-rt
          tar -xzf tarballs/ts-runtypes-binary-${{ matrix.pkg }}-*.tgz -C bin-rt --strip-components=2 package/lib/ts-runtypes
          # Static CGO-free binary runs on a minimal image; --version proves it
          # executes on this arch and prints the embedded version + tsgo revision.
          docker run --rm --platform ${{ matrix.platform }} \
            -v "$PWD/bin-rt:/rt" debian:bookworm-slim /rt/ts-runtypes --version

  benchmarks:
    name: validation + type-cost benchmarks (podman)
    runs-on: ubuntu-latest
    # CI never builds the shared image; it pulls the prebuilt one (needs packages:read).
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      # Reclaim preinstalled cruft before the image pull + Go build-cache restore.
      - uses: ./.github/actions/free-disk
      - uses: ./.github/actions/bootstrap
      - name: podman version
        run: podman --version
      # Builds the Go resolver binary + the marker/plugin packages on the runner
      # (these are mounted into the pulled image at run time).
      - name: Prep ts-runtypes toolchain
        run: pnpm rtx bench prep
      - name: Pull the prebuilt shared image (CI never builds it)
        uses: ./.github/actions/pull-shared-image
        with:
          # Auth all GHCR pulls with the PAT (via `secrets: inherit`); it falls back
          # to GITHUB_TOKEN when absent (fork PRs) - tsrt-website is readable either way.
          password: ${{ secrets.GHCR_PAT }}
      - name: Run the benchmark (build + run, in the container)
        run: pnpm rtx bench
      - name: Type-checking cost (TS type instantiations)
        run: pnpm rtx bench typecost

  website-build:
    name: static docs site build (podman)
    runs-on: ubuntu-latest
    # Prove the static site builds. CI never builds the image; it pulls the
    # prebuilt one. This is a build check only - the real bench-data-baked deploy
    # happens in publish.yml.
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive # tsgolint submodule - the playground WASM Go build needs it
      # Reclaim preinstalled cruft before the image pull + Go build-cache restore.
      - uses: ./.github/actions/free-disk
      # `container-build` runs on the HOST to drive the podman build AND to prebuild
      # the playground assets (build-playground.mjs: the resolver WASM + the vendored
      # ts-runtypes dist that nuxt build imports). bootstrap gives the host Go +
      # garble + Node + pnpm + deps + the tsgolint patches all of that needs; without
      # it the WASM `go build` fails and nuxt build dies on the missing vendor dist.
      - uses: ./.github/actions/bootstrap
      - name: podman version
        run: podman --version
      # Build the playground WASM PLAIN (obfuscation is irrelevant to a build check
      # and plain is faster on a cache miss - mirrors ci.yml's website smoke). Cache
      # it so a UI-only change skips the multi-minute rebuild.
      - name: Cache the playground wasm
        uses: ./.github/actions/cache-playground-wasm
        with:
          mode: plain
      - name: Pull the prebuilt shared image (CI never builds it)
        uses: ./.github/actions/pull-shared-image
        with:
          # Auth all GHCR pulls with the PAT (via `secrets: inherit`); it falls back
          # to GITHUB_TOKEN when absent (fork PRs) - tsrt-website is readable either way.
          password: ${{ secrets.GHCR_PAT }}
      # The container-only prod build (not the full data pipeline) - produces
      # container/website/.output. RT_GARBLE=0 matches the plain WASM cache above.
      - name: Production build inside the container
        env:
          RT_GARBLE: '0'
        run: pnpm rtx website container-build
      - name: Upload build output
        uses: actions/upload-artifact@v7
        with:
          name: website-output
          path: container/website/.output
          if-no-files-found: error
